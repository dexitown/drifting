<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Chating</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0a0a0a;
  --bg2:#111;
  --bg3:#181818;
  --border:#1e1e1e;
  --border2:#2a2a2a;
  --text:#f0ede8;
  --muted:#666;
  --accent:#c8b89a;
  --accent2:#8a7a6a;
  --serif:'Cormorant Garamond',serif;
  --sans:'DM Sans',sans-serif;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--sans);}
input,textarea,button{font-family:var(--sans);}

/* SCROLLBAR */
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px;}

/* SCREENS */
.screen{display:none;min-height:100dvh;}
.screen.active{display:block;}

/* ─── AUTH ─── */
#auth-screen{display:none;align-items:center;justify-content:center;min-height:100dvh;padding:20px;}
#auth-screen.active{display:flex !important;}
.auth-box{width:100%;max-width:360px;background:var(--bg2);border:0.5px solid var(--border2);border-radius:20px;padding:40px 32px;display:flex;flex-direction:column;gap:20px;}
.auth-logo{font-family:var(--serif);font-size:32px;font-weight:300;letter-spacing:2px;color:var(--text);text-align:center;font-style:italic;}
.auth-logo span{color:var(--accent);}
.auth-tabs{display:flex;border:0.5px solid var(--border2);border-radius:10px;overflow:hidden;}
.auth-tab{flex:1;padding:10px;background:transparent;border:none;color:var(--muted);font-size:13px;cursor:pointer;transition:all 0.2s;}
.auth-tab.active{background:var(--bg3);color:var(--text);}
.auth-form{display:flex;flex-direction:column;gap:12px;}
.auth-input{background:var(--bg);border:0.5px solid var(--border2);border-radius:10px;padding:12px 14px;font-size:14px;color:var(--text);outline:none;transition:border-color 0.2s;width:100%;}
.auth-input:focus{border-color:var(--accent2);}
.auth-input::placeholder{color:var(--muted);}
.auth-btn{padding:12px;background:var(--accent);border:none;border-radius:10px;font-size:14px;font-weight:500;color:#0a0a0a;cursor:pointer;transition:opacity 0.2s,transform 0.1s;}
.auth-btn:hover{opacity:0.85;}
.auth-btn:active{transform:scale(0.98);}
.auth-error{font-size:12px;color:#e24b4a;text-align:center;min-height:16px;}

/* ─── APP SHELL ─── */
#app-screen{display:none;flex-direction:column;min-height:100dvh;}
#app-screen.active{display:flex;}

/* TOP NAV */
#topnav{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(10,10,10,0.92);backdrop-filter:blur(12px);border-bottom:0.5px solid var(--border);padding:0 20px;height:52px;display:flex;align-items:center;justify-content:space-between;max-width:600px;margin:0 auto;width:100%;}
.nav-logo{font-family:var(--serif);font-size:22px;font-weight:300;font-style:italic;color:var(--text);letter-spacing:1px;}
.nav-logo span{color:var(--accent);}
.nav-actions{display:flex;gap:16px;align-items:center;}
.nav-btn{background:none;border:none;cursor:pointer;color:var(--muted);padding:4px;transition:color 0.2s;display:flex;align-items:center;justify-content:center;}
.nav-btn:hover{color:var(--text);}
.nav-btn svg{width:20px;height:20px;fill:currentColor;}

/* BOTTOM NAV */
#bottomnav{position:fixed;bottom:0;left:0;right:0;z-index:100;background:rgba(10,10,10,0.95);backdrop-filter:blur(12px);border-top:0.5px solid var(--border);display:flex;justify-content:space-around;align-items:center;padding:8px 0 max(8px, env(safe-area-inset-bottom));max-width:600px;margin:0 auto;width:100%;}
.bnav-btn{background:none;border:none;cursor:pointer;color:var(--muted);padding:8px 16px;display:flex;flex-direction:column;align-items:center;gap:3px;transition:color 0.2s;}
.bnav-btn.active{color:var(--accent);}
.bnav-btn svg{width:22px;height:22px;fill:currentColor;}
.bnav-btn span{font-size:10px;letter-spacing:0.5px;}

/* MAIN CONTENT */
#main-content{flex:1;padding-top:52px;padding-bottom:70px;max-width:600px;margin:0 auto;width:100%;}

/* ─── STORIES ─── */
#stories-bar{padding:16px 0 12px;overflow-x:auto;display:flex;gap:12px;padding-left:16px;scrollbar-width:none;}
#stories-bar::-webkit-scrollbar{display:none;}
.story-item{display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;flex-shrink:0;}
.story-ring{width:58px;height:58px;border-radius:50%;padding:2px;background:linear-gradient(135deg,var(--accent2),var(--accent));position:relative;}
.story-ring.seen{background:var(--border2);}
.story-ring.add-story{background:var(--border2);}
.story-avatar{width:100%;height:100%;border-radius:50%;border:2px solid var(--bg);background:var(--bg3);overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:18px;}
.story-avatar img{width:100%;height:100%;object-fit:cover;}
.story-username{font-size:11px;color:var(--muted);max-width:64px;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.add-icon{font-size:22px;color:var(--accent);}

/* ─── FEED ─── */
#feed{padding:0 0 8px;}
.post-card{border-bottom:0.5px solid var(--border);margin-bottom:0;}
.post-header{display:flex;align-items:center;gap:10px;padding:12px 16px;}
.post-avatar{width:32px;height:32px;border-radius:50%;background:var(--bg3);overflow:hidden;flex-shrink:0;}
.post-avatar img{width:100%;height:100%;object-fit:cover;}
.post-avatar-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:500;color:var(--accent);background:var(--bg3);}
.post-user{font-size:13px;font-weight:500;color:var(--text);}
.post-time{font-size:11px;color:var(--muted);}
.post-img{width:100%;aspect-ratio:1;object-fit:cover;display:block;background:var(--bg3);}
.post-img.portrait{aspect-ratio:4/5;}
.post-actions{display:flex;align-items:center;gap:16px;padding:12px 16px 8px;}
.action-btn{background:none;border:none;cursor:pointer;color:var(--muted);display:flex;align-items:center;gap:6px;font-size:13px;transition:color 0.2s;padding:0;}
.action-btn:hover{color:var(--text);}
.action-btn.liked{color:#e24b4a;}
.action-btn svg{width:20px;height:20px;fill:currentColor;}
.post-caption{padding:0 16px 4px;font-size:13px;line-height:1.55;color:var(--text);}
.post-caption strong{font-weight:500;}
.post-comments-preview{padding:0 16px 12px;}
.comment-preview{font-size:12px;color:var(--muted);line-height:1.5;}
.comment-preview strong{color:var(--text);font-weight:500;}
.view-comments{font-size:12px;color:var(--muted);cursor:pointer;margin-top:2px;}

/* ─── UPLOAD MODAL ─── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:200;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.3s;}
.modal-overlay.open{opacity:1;pointer-events:all;}
.modal-box{background:var(--bg2);border:0.5px solid var(--border2);border-radius:20px 20px 0 0;width:100%;max-width:600px;padding:24px 20px 40px;transform:translateY(100%);transition:transform 0.35s cubic-bezier(0.32,0.72,0,1);}
.modal-overlay.open .modal-box{transform:translateY(0);}
.modal-handle{width:36px;height:3px;background:var(--border2);border-radius:3px;margin:0 auto 20px;}
.modal-title{font-family:var(--serif);font-size:20px;font-weight:300;font-style:italic;color:var(--text);margin-bottom:20px;text-align:center;}
.upload-zone{border:0.5px dashed var(--border2);border-radius:14px;padding:32px;text-align:center;cursor:pointer;transition:border-color 0.2s;position:relative;overflow:hidden;}
.upload-zone:hover{border-color:var(--accent2);}
.upload-zone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
.upload-preview{width:100%;max-height:300px;object-fit:cover;border-radius:10px;display:none;margin-bottom:12px;}
.upload-icon{font-size:32px;margin-bottom:8px;color:var(--muted);}
.upload-text{font-size:13px;color:var(--muted);}
.caption-input{width:100%;background:var(--bg);border:0.5px solid var(--border2);border-radius:10px;padding:12px 14px;font-size:14px;color:var(--text);outline:none;resize:none;margin-top:12px;line-height:1.5;}
.caption-input::placeholder{color:var(--muted);}
.caption-input:focus{border-color:var(--accent2);}
.modal-actions{display:flex;gap:10px;margin-top:16px;}
.modal-cancel{flex:1;padding:12px;background:transparent;border:0.5px solid var(--border2);border-radius:10px;font-size:14px;color:var(--muted);cursor:pointer;}
.modal-submit{flex:2;padding:12px;background:var(--accent);border:none;border-radius:10px;font-size:14px;font-weight:500;color:#0a0a0a;cursor:pointer;transition:opacity 0.2s;}
.modal-submit:disabled{opacity:0.4;cursor:not-allowed;}
.progress-bar{height:2px;background:var(--border2);border-radius:2px;margin-top:12px;overflow:hidden;display:none;}
.progress-fill{height:100%;background:var(--accent);border-radius:2px;width:0%;transition:width 0.3s;}

/* ─── STORY VIEWER ─── */
#story-viewer{position:fixed;inset:0;background:#000;z-index:300;display:none;flex-direction:column;}
#story-viewer.open{display:flex;}
.story-progress-bars{display:flex;gap:3px;padding:12px 12px 0;position:absolute;top:0;left:0;right:0;z-index:10;}
.story-prog{flex:1;height:2px;background:rgba(255,255,255,0.3);border-radius:2px;overflow:hidden;}
.story-prog-fill{height:100%;background:#fff;width:0%;transition:width linear;}
.story-viewer-header{position:absolute;top:20px;left:0;right:0;z-index:10;display:flex;align-items:center;gap:10px;padding:0 16px;}
.story-viewer-avatar{width:32px;height:32px;border-radius:50%;background:var(--bg3);overflow:hidden;}
.story-viewer-avatar img{width:100%;height:100%;object-fit:cover;}
.story-viewer-name{font-size:13px;font-weight:500;color:#fff;}
.story-viewer-time{font-size:11px;color:rgba(255,255,255,0.6);}
.story-close{margin-left:auto;background:none;border:none;color:#fff;cursor:pointer;font-size:22px;padding:4px;}
#story-img{width:100%;height:100%;object-fit:contain;}
.story-nav{position:absolute;inset:0;display:flex;}
.story-nav-left{flex:1;}
.story-nav-right{flex:1;}

/* ─── PROFILE ─── */
#profile-screen{padding:0;}
.profile-header{padding:20px 16px 0;}
.profile-top{display:flex;align-items:center;gap:20px;margin-bottom:16px;}
.profile-pic{width:80px;height:80px;border-radius:50%;background:var(--bg3);overflow:hidden;border:0.5px solid var(--border2);flex-shrink:0;position:relative;cursor:pointer;}
.profile-pic img{width:100%;height:100%;object-fit:cover;}
.profile-pic-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-size:28px;font-style:italic;color:var(--accent);}
.profile-pic input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
.profile-stats{display:flex;gap:24px;}
.stat{display:flex;flex-direction:column;align-items:center;}
.stat-num{font-size:18px;font-weight:500;color:var(--text);}
.stat-label{font-size:11px;color:var(--muted);}
.profile-name{font-family:var(--serif);font-size:22px;font-weight:300;font-style:italic;color:var(--text);}
.profile-bio{font-size:13px;color:var(--muted);line-height:1.6;margin-top:4px;}
.profile-edit-btn{width:100%;margin-top:14px;padding:9px;background:transparent;border:0.5px solid var(--border2);border-radius:10px;font-size:13px;color:var(--text);cursor:pointer;transition:background 0.2s;}
.profile-edit-btn:hover{background:var(--bg3);}
.profile-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;margin-top:16px;}
.grid-item{aspect-ratio:1;overflow:hidden;cursor:pointer;background:var(--bg3);}
.grid-item img{width:100%;height:100%;object-fit:cover;transition:opacity 0.2s;}
.grid-item:hover img{opacity:0.8;}

/* ─── EXPLORE ─── */
#explore-screen{padding:16px;}
.explore-search{width:100%;background:var(--bg2);border:0.5px solid var(--border2);border-radius:10px;padding:10px 14px;font-size:14px;color:var(--text);outline:none;margin-bottom:16px;}
.explore-search::placeholder{color:var(--muted);}
.explore-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:2px;}
.explore-item{aspect-ratio:1;overflow:hidden;cursor:pointer;background:var(--bg3);}
.explore-item img{width:100%;height:100%;object-fit:cover;transition:opacity 0.2s;}
.explore-item:hover img{opacity:0.75;}

/* ─── COMMENTS MODAL ─── */
#comments-modal .modal-box{max-height:75dvh;display:flex;flex-direction:column;}
.comments-list{flex:1;overflow-y:auto;margin-bottom:12px;}
.comment-item{display:flex;gap:10px;padding:8px 0;border-bottom:0.5px solid var(--border);}
.comment-avatar{width:28px;height:28px;border-radius:50%;background:var(--bg3);flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--accent);}
.comment-body{flex:1;}
.comment-user{font-size:13px;font-weight:500;color:var(--text);}
.comment-text{font-size:13px;color:var(--muted);line-height:1.5;}
.comment-input-row{display:flex;gap:8px;align-items:center;}
.comment-input{flex:1;background:var(--bg);border:0.5px solid var(--border2);border-radius:20px;padding:9px 14px;font-size:13px;color:var(--text);outline:none;}
.comment-input::placeholder{color:var(--muted);}
.comment-send{background:none;border:none;color:var(--accent);cursor:pointer;font-size:13px;font-weight:500;padding:4px 8px;}

/* TOAST */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--bg3);border:0.5px solid var(--border2);border-radius:20px;padding:10px 20px;font-size:13px;color:var(--text);opacity:0;transition:all 0.3s;pointer-events:none;z-index:500;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* LOADER */
.loader{display:flex;align-items:center;justify-content:center;padding:40px;}
.loader-dot{width:6px;height:6px;border-radius:50%;background:var(--border2);animation:ldot 1.2s infinite;margin:0 3px;}
.loader-dot:nth-child(2){animation-delay:0.2s;}
.loader-dot:nth-child(3){animation-delay:0.4s;}
@keyframes ldot{0%,60%,100%{opacity:0.3;transform:scale(1)}30%{opacity:1;transform:scale(1.2)}}

/* EMPTY STATE */
.empty-state{padding:60px 20px;text-align:center;}
.empty-icon{font-size:40px;margin-bottom:12px;opacity:0.3;}
.empty-text{font-family:var(--serif);font-size:18px;font-style:italic;color:var(--muted);}
.empty-sub{font-size:13px;color:var(--border2);margin-top:6px;}
</style>
</head>
<body>

<!-- AUTH -->
<div id="auth-screen" class="screen active">
  <div class="auth-box">
    <div class="auth-logo"><span>C</span>hating</div>
    <div class="auth-tabs">
      <button class="auth-tab active" id="tab-login" onclick="switchTab('login')">Entrar</button>
      <button class="auth-tab" id="tab-register" onclick="switchTab('register')">Registrarse</button>
    </div>
    <div class="auth-form">
      <input class="auth-input" id="auth-email" type="email" placeholder="Email"/>
      <input class="auth-input" id="auth-password" type="password" placeholder="Contraseña"/>
      <input class="auth-input" id="auth-username" type="text" placeholder="Nombre de usuario" style="display:none"/>
      <div class="auth-error" id="auth-error"></div>
      <button class="auth-btn" id="auth-submit-btn" onclick="handleAuth()">Entrar</button>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app-screen" class="screen">
  <!-- TOP NAV -->
  <nav id="topnav">
    <div class="nav-logo"><span>C</span>hating</div>
    <div class="nav-actions">
      <button class="nav-btn" onclick="openUpload()">
        <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm5 11h-4v4h-2v-4H7v-2h4V7h2v4h4v2z"/></svg>
      </button>
      <button class="nav-btn" onclick="logout()">
        <svg viewBox="0 0 24 24"><path d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z"/></svg>
      </button>
    </div>
  </nav>

  <!-- MAIN -->
  <div id="main-content">
    <!-- HOME -->
    <div id="home-screen">
      <div id="stories-bar"></div>
      <div id="feed">
        <div class="loader" id="feed-loader"><div class="loader-dot"></div><div class="loader-dot"></div><div class="loader-dot"></div></div>
      </div>
    </div>

    <!-- EXPLORE -->
    <div id="explore-screen" style="display:none;">
      <input class="explore-search" placeholder="Buscar usuarios..." id="search-input" oninput="searchUsers(this.value)"/>
      <div id="search-results" style="display:none;margin-bottom:16px;"></div>
      <div class="explore-grid" id="explore-grid"></div>
    </div>

    <!-- PROFILE -->
    <div id="profile-screen" style="display:none;">
      <div class="profile-header">
        <div class="profile-top">
          <div class="profile-pic" id="profile-pic-wrap">
            <div class="profile-pic-placeholder" id="profile-pic-placeholder"></div>
            <img id="profile-pic-img" style="display:none;position:absolute;inset:0;width:100%;height:100%;object-fit:cover;border-radius:50%;"/>
            <input type="file" accept="image/*" onchange="uploadProfilePic(this)"/>
          </div>
          <div class="profile-stats">
            <div class="stat"><span class="stat-num" id="stat-posts">0</span><span class="stat-label">posts</span></div>
            <div class="stat"><span class="stat-num" id="stat-followers">0</span><span class="stat-label">seguidores</span></div>
            <div class="stat"><span class="stat-num" id="stat-following">0</span><span class="stat-label">siguiendo</span></div>
          </div>
        </div>
        <div class="profile-name" id="profile-display-name"></div>
        <div class="profile-bio" id="profile-bio-text"></div>
        <button class="profile-edit-btn" onclick="openEditProfile()">Editar perfil</button>
      </div>
      <div class="profile-grid" id="profile-grid"></div>
    </div>
  </div>

  <!-- BOTTOM NAV -->
  <nav id="bottomnav">
    <button class="bnav-btn active" id="bnav-home" onclick="showTab('home')">
      <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
      <span>inicio</span>
    </button>
    <button class="bnav-btn" id="bnav-explore" onclick="showTab('explore')">
      <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
      <span>explorar</span>
    </button>
    <button class="bnav-btn" id="bnav-profile" onclick="showTab('profile')">
      <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
      <span>perfil</span>
    </button>
  </nav>
</div>

<!-- UPLOAD MODAL -->
<div class="modal-overlay" id="upload-modal" onclick="closeIfOverlay(event,'upload-modal')">
  <div class="modal-box">
    <div class="modal-handle"></div>
    <div class="modal-title">Nueva publicación</div>
    <div class="upload-zone" id="upload-zone">
      <img id="upload-preview" class="upload-preview"/>
      <div id="upload-placeholder">
        <div class="upload-icon">🖼</div>
        <div class="upload-text">Tocá para elegir una foto</div>
      </div>
      <input type="file" accept="image/*" onchange="previewImage(this)" id="upload-file-input"/>
    </div>
    <textarea class="caption-input" id="caption-input" rows="2" placeholder="Escribí un pie de foto..."></textarea>
    <div class="progress-bar" id="upload-progress"><div class="progress-fill" id="progress-fill"></div></div>
    <div class="modal-actions">
      <button class="modal-cancel" onclick="closeModal('upload-modal')">Cancelar</button>
      <button class="modal-submit" id="upload-submit" onclick="submitPost()" disabled>Publicar</button>
    </div>
  </div>
</div>

<!-- STORY UPLOAD MODAL -->
<div class="modal-overlay" id="story-modal" onclick="closeIfOverlay(event,'story-modal')">
  <div class="modal-box">
    <div class="modal-handle"></div>
    <div class="modal-title">Nueva story</div>
    <div class="upload-zone" id="story-upload-zone">
      <img id="story-preview" class="upload-preview"/>
      <div id="story-placeholder">
        <div class="upload-icon">✨</div>
        <div class="upload-text">Elegí una foto para tu story</div>
      </div>
      <input type="file" accept="image/*" onchange="previewStory(this)" id="story-file-input"/>
    </div>
    <div class="progress-bar" id="story-progress"><div class="progress-fill" id="story-fill"></div></div>
    <div class="modal-actions">
      <button class="modal-cancel" onclick="closeModal('story-modal')">Cancelar</button>

// ─── CLOUDINARY UPLOAD ───
async function uploadToCloudinary(file, onProgress) {
  const formData = new FormData();
  formData.append('file', file);
  formData.append('upload_preset', UPLOAD_PRESET);
  formData.append('cloud_name', CLOUD_NAME);
  return new Promise((resolve, reject) => {
    const xhr = new XMLHttpRequest();
    xhr.open('POST', `https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`);
    xhr.upload.onprogress = e => { if (e.lengthComputable && onProgress) onProgress(Math.round(e.loaded/e.total*100)); };
    xhr.onload = () => {
      const data = JSON.parse(xhr.responseText);
      if (data.secure_url) resolve(data.secure_url);
      else reject(new Error('Upload failed'));
    };
    xhr.onerror = () => reject(new Error('Network error'));
    xhr.send(formData);
  });
}

// ─── FEED ───
async function loadFeed() {
  const loader = document.getElementById('feed-loader');
  loader.style.display = 'flex';
  const postsRef = query(ref(db, 'posts'), orderByChild('timestamp'), limitToLast(30));
  onValue(postsRef, async snap => {
    loader.style.display = 'none';
    const feed = document.getElementById('feed');
    feed.innerHTML = '';
    if (!snap.exists()) {
      feed.innerHTML = `<div class="empty-state"><div class="empty-icon">🌿</div><div class="empty-text">Todavía no hay publicaciones</div><div class="empty-sub">Sé el primero en publicar algo</div></div>`;
      return;
    }
    const posts = [];
    snap.forEach(child => posts.unshift({ id: child.key, ...child.val() }));
    for (const post of posts) {
      const userSnap = await get(ref(db, 'users/' + post.uid));
      const user = userSnap.exists() ? userSnap.val() : { username: 'usuario', avatar: '' };
      const likeSnap = await get(ref(db, 'likes/' + post.id + '/' + currentUser.uid));
      const liked = likeSnap.exists();
      const commentSnap = await get(ref(db, 'comments/' + post.id));
      const commentCount = commentSnap.exists() ? Object.keys(commentSnap.val()).length : 0;
      feed.insertAdjacentHTML('beforeend', buildPostCard(post, user, liked, commentCount));
    }
  });
}

function buildPostCard(post, user, liked, commentCount) {
  const initials = user.username.charAt(0).toUpperCase();

  return `
  <div class="post-card" id="post-${post.id}">
    <div class="post-header">
      <div class="post-avatar">${avatarHtml}</div>
      <div style="flex:1"><div class="post-user">${user.username}</div><div class="post-time">${timeAgo}</div></div>
    </div>
    <img class="post-img" src="${post.imageUrl}" loading="lazy" alt=""/>
    <div class="post-actions">
      <button class="action-btn ${liked?'liked':''}" onclick="toggleLike('${post.id}',this)">
        <svg viewBox="0 0 24 24"><path d="${liked?'M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z':'M16.5 3c-1.74 0-3.41.81-4.5 2.09C10.91 3.81 9.24 3 7.5 3 4.42 3 2 5.42 2 8.5c0 3.78 3.4 6.86 8.55 11.54L12 21.35l1.45-1.32C18.6 15.36 22 12.28 22 8.5 22 5.42 19.58 3 16.5 3zm-4.4 15.55l-.1.1-.1-.1C7.14 14.24 4 11.39 4 8.5 4 6.5 5.5 5 7.5 5c1.54 0 3.04.99 3.57 2.36h1.87C13.46 5.99 14.96 5 16.5 5c2 0 3.5 1.5 3.5 3.5 0 2.89-3.14 5.74-7.9 10.05z'}"/></svg>
        <span id="likes-${post.id}">${post.likes||0}</span>
      </button>
      <button class="action-btn" onclick="openComments('${post.id}')">
        <svg viewBox="0 0 24 24"><path d="M21.99 4c0-1.1-.89-2-1.99-2H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h14l4 4-.01-18z"/></svg>
        <span>${commentCount}</span>
      </button>
    </div>
    ${post.caption ? `<div class="post-caption"><strong>${user.username}</strong> ${post.caption}</div>` : ''}
  </div>`;
}

// ─── LIKES ───
window.toggleLike = async (postId, btn) => {
  const likeRef = ref(db, 'likes/' + postId + '/' + currentUser.uid);
  const postRef = ref(db, 'posts/' + postId + '/likes');
  const snap = await get(likeRef);
  const postSnap = await get(postRef);
  const current = postSnap.exists() ? postSnap.val() : 0;
  if (snap.exists()) {
    await remove(likeRef);
    await set(postRef, Math.max(0, current - 1));
    btn.classList.remove('liked');
    btn.querySelector('span').textContent = Math.max(0, current - 1);
    btn.querySelector('path').setAttribute('d', 'M16.5 3c-1.74 0-3.41.81-4.5 2.09C10.91 3.81 9.24 3 7.5 3 4.42 3 2 5.42 2 8.5c0 3.78 3.4 6.86 8.55 11.54L12 21.35l1.45-1.32C18.6 15.36 22 12.28 22 8.5 22 5.42 19.58 3 16.5 3zm-4.4 15.55l-.1.1-.1-.1C7.14 14.24 4 11.39 4 8.5 4 6.5 5.5 5 7.5 5c1.54 0 3.04.99 3.57 2.36h1.87C13.46 5.99 14.96 5 16.5 5c2 0 3.5 1.5 3.5 3.5 0 2.89-3.14 5.74-7.9 10.05z');
  } else {
    await set(likeRef, true);
    await set(postRef, current + 1);
    btn.classList.add('liked');
    btn.querySelector('span').textContent = current + 1;
    btn.querySelector('path').setAttribute('d', 'M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z');
  }
};

// ─── STORIES ───
async function loadStories() {
  const bar = document.getElementById('stories-bar');
  bar.innerHTML = '';
  // Add story button
  bar.insertAdjacentHTML('beforeend', `
    <div class="story-item" onclick="openModal('story-modal')">
      <div class="story-ring add-story">
        <div class="story-avatar"><span class="add-icon">+</span></div>
      </div>
      <span class="story-username">Tu story</span>
    </div>`);

  const snap = await get(ref(db, 'stories'));
  if (!snap.exists()) return;
  const now = Date.now();
  const stories = {};
  snap.forEach(userStories => {
    userStories.forEach(s => {
      const data = s.val();
      if (now - data.timestamp < 86400000) {
        if (!stories[data.uid]) stories[data.uid] = { user: data.username, avatar: data.avatar||'', items: [] };
        stories[data.uid].items.push(data);
      }
    });
  });
  for (const uid in stories) {
    const s = stories[uid];
    const initial = s.user.charAt(0).toUpperCase();
    const avatarHtml = s.avatar ? `<img src="${s.avatar}" alt=""/>` : `<span style="font-size:18px;color:var(--accent);font-family:var(--serif);font-style:italic">${initial}</span>`;
    bar.insertAdjacentHTML('beforeend', `
      <div class="story-item" onclick='viewStory(${JSON.stringify(s)})'>
        <div class="story-ring">
          <div class="story-avatar">${avatarHtml}</div>
        </div>
        <span class="story-username">${s.user}</span>
      </div>`);
  }
}

// story viewer
window.viewStory = (storyData) => {
  storyQueue = storyData.items;
  storyIndex = 0;
  showStory();
  document.getElementById('story-viewer').classList.add('open');
};

function showStory() {
  if (storyIndex >= storyQueue.length) { closeStoryViewer(); return; }
  const s = storyQueue[storyIndex];
  document.getElementById('story-img').src = s.imageUrl;
  document.getElementById('sv-name').textContent = s.username;
  document.getElementById('sv-time').textContent = getTimeAgo(s.timestamp);
  const bars = document.getElementById('story-prog-bars');
  bars.innerHTML = '';
  storyQueue.forEach((_, i) => {
    bars.insertAdjacentHTML('beforeend', `<div class="story-prog"><div class="story-prog-fill" id="spf-${i}"></div></div>`);
  });
  clearTimeout(storyTimer);
  setTimeout(() => {
    const fill = document.getElementById('spf-' + storyIndex);
    if (fill) { fill.style.transition = 'width 5s linear'; fill.style.width = '100%'; }
  }, 50);
  storyTimer = setTimeout(nextStory, 5000);
  for (let i = 0; i < storyIndex; i++) {
    const f = document.getElementById('spf-' + i);
    if (f) f.style.width = '100%';
  }
}

window.nextStory = () => { storyIndex++; showStory(); };
window.prevStory = () => { storyIndex = Math.max(0, storyIndex - 1); showStory(); };
window.closeStoryViewer = () => {
  clearTimeout(storyTimer);
  document.getElementById('story-viewer').classList.remove('open');
};

  closeModal('edit-profile-modal');
  loadProfile();
  showToast('Perfil actualizado ✓');
};

// ─── EXPLORE ───
async function loadExplore() {
  const grid = document.getElementById('explore-grid');
  grid.innerHTML = '';
  const snap = await get(query(ref(db, 'posts'), orderByChild('timestamp'), limitToLast(30)));
  if (!snap.exists()) { grid.innerHTML = '<div style="grid-column:span 3;text-align:center;padding:40px;font-size:13px;color:var(--muted)">Sin publicaciones aún</div>'; return; }
  const posts = [];
  snap.forEach(p => posts.unshift(p.val()));
  posts.forEach(p => {
    grid.insertAdjacentHTML('beforeend', `<div class="explore-item"><img src="${p.imageUrl}" loading="lazy" alt=""/></div>`);
  });
}

window.searchUsers = async (q) => {
  const resultsEl = document.getElementById('search-results');
  if (!q.trim()) { resultsEl.style.display = 'none'; return; }
  resultsEl.style.display = 'block';
  const snap = await get(ref(db, 'users'));
  resultsEl.innerHTML = '';
  if (!snap.exists()) return;
  snap.forEach(u => {
    const user = u.val();
    if (user.username && user.username.toLowerCase().includes(q.toLowerCase())) {
      const initial = user.username.charAt(0).toUpperCase();
      resultsEl.insertAdjacentHTML('beforeend', `
        <div style="display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:0.5px solid var(--border);">
          <div style="width:36px;height:36px;border-radius:50%;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--accent);overflow:hidden;">
            ${user.avatar ? `<img src="${user.avatar}" style="width:100%;height:100%;object-fit:cover;"/>` : initial}
          </div>
          <div>
            <div style="font-size:14px;font-weight:500;color:var(--text)">${user.username}</div>
            <div style="font-size:12px;color:var(--muted)">${user.bio||''}</div>
          </div>
        </div>`);
    }
  });
};

// ─── UTILS ───
function getTimeAgo(ts) {
  const diff = Date.now() - ts;
  if (diff < 60000) return 'ahora';
  if (diff < 3600000) return Math.floor(diff/60000) + 'm';
  if (diff < 86400000) return Math.floor(diff/3600000) + 'h';
  return Math.floor(diff/86400000) + 'd';
}

window.openModal = (id) => {
  document.getElementById(id).classList.add('open');
};
window.closeModal = (id) => {
  document.getElementById(id).classList.remove('open');
};
window.closeIfOverlay = (e, id) => {
  if (e.target === document.getElementById(id)) closeModal(id);
};

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
</script>
